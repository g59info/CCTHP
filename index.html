<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brave Group - Project G59</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --system-green: #00ff41;
            --teaser-white: #ffffff;
            --win-gray: #c0c0c0;
            --win-blue: #000080;
            --x-color: #1DA1F2;
            --tiktok-color: #00f2ea;
            --tiktok-pink: #ff0050;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: "Noto Serif JP", serif; }

        /* 走査線 */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10001; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        /* 4周目専用背景 */
        .phase-4-red, .phase-4-red #loading-screen, .phase-4-red .teaser-screen, .phase-4-red #logo-screen {
            background-color: #800 !important;
            --system-green: #fff;
            --teaser-white: #000;
        }

        /* 共通設定 */
        #loading-screen, .teaser-screen, #logo-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9000; transition: opacity 1s, clip-path 1.5s cubic-bezier(0.7, 0, 0.3, 1);
            background-color: var(--bg-color);
        }

        #loading-screen { z-index: 9999; clip-path: circle(150% at 50% 50%); font-family: 'Courier New', monospace; }
        #loading-screen.loaded { clip-path: circle(0% at 50% 50%); opacity: 0; pointer-events: none; }
        .loading-text { font-size: 1.1rem; letter-spacing: 0.2em; color: var(--system-green); }
        .progress-container { width: 260px; height: 16px; border: 2px solid var(--system-green); padding: 2px; margin-top: 15px; }
        #progress-bar { width: 0%; height: 100%; background: var(--system-green); transition: width 0.1s linear; }

        .teaser-screen { opacity: 0; visibility: hidden; width: 100%; }
        .teaser-text { text-align: center; color: var(--teaser-white); font-weight: 900; transform: scale(1.1); filter: blur(12px); opacity: 0; width: 95%; }
        .font-main { font-size: 4rem; letter-spacing: 0.15em; line-height: 1.4; }
        .font-vision { font-size: 3.2rem; letter-spacing: 0.25em; white-space: nowrap; }

        .teaser-screen.active { opacity: 1; visibility: visible; }
        .teaser-screen.active .teaser-text { animation: smoothPunch 0.7s forwards; }

        @keyframes smoothPunch {
            0% { transform: scale(1.3); filter: blur(12px); opacity: 0; }
            40% { transform: scale(0.97); filter: blur(0px); opacity: 1; }
            100% { transform: scale(1); filter: blur(0px); opacity: 1; }
        }

        /* メイン画像 */
        #main-content { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 2s; z-index: 1; }
        #main-content.show { opacity: 1; }
        .hero-image { width: 100%; height: 100%; object-fit: cover; }

        /* エラー窓用パーツ */
        .error-popup-instance { position: fixed; width: 320px; background: var(--win-gray); border: 2px solid; border-color: #fff #000 #000 #fff; z-index: 11000; padding: 2px; font-family: sans-serif; }

        /* --- SNSリンクボタン (位置調整版) --- */
        #sns-buttons {
            position: fixed; 
            bottom: 25vh; /* 画面下から25%（たて1/4）の位置に配置 */
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 25px; 
            z-index: 10005; 
            opacity: 0; 
            visibility: hidden; 
            transition: opacity 1.5s ease-out, visibility 1.5s;
        }
        #sns-buttons.show { opacity: 1; visibility: visible; }

        .sns-btn {
            display: flex; align-items: center; justify-content: center;
            width: 60px; height: 60px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .sns-btn svg { width: 28px; height: 28px; fill: #fff; transition: fill 0.3s; }
        .sns-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }
        .sns-btn.x-btn:hover svg { fill: var(--x-color); }
        .sns-btn.tiktok-btn:hover svg { fill: var(--tiktok-color); filter: drop-shadow(2px 0 0 var(--tiktok-pink)); }
    </style>
</head>
<body id="body-tag">

    <div class="noise-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://raw.githubusercontent.com/manan19/Static-Assets/master/noise.gif'); opacity: 0.3; z-index: 10000; pointer-events: none; display: none;"></div>

    <div id="loading-screen">
        <div class="loading-text" id="loading-text-el" data-original="NOW_LOADING:">NOW_LOADING: <span id="percent">0</span>%</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="logo-screen"><img src="logo.png" alt="Logo" style="width: 40%; max-width: 450px; filter: grayscale(100%) brightness(1.8);"></div>

    <div id="teaser-1" class="teaser-screen"><div class="teaser-text font-main" data-original="Brave Group<br>完全新規プロジェクト">Brave Group<br>完全新規プロジェクト</div></div>
    <div id="teaser-2" class="teaser-screen"><div class="teaser-text font-main" data-original="アイドルグループ？？">アイドルグループ<span style="font-family:serif;font-style:italic;">？？</span></div></div>
    <div id="teaser-3" class="teaser-screen"><div class="teaser-text font-vision" data-original="少女たちはここから全てを超えてゆく">少女たちはここから全てを超えてゆく</div></div>
    <div id="teaser-4" class="teaser-screen"><div class="teaser-text font-main" data-original="例え全てのアイドルを<br>鏖にしても">例え全てのアイドルを<br><span style="color:#000;">鏖</span>にしても</div></div>

    <main id="main-content"><img id="dynamic-img" src="" alt="" class="hero-image"></main>

    <div id="sns-buttons">
        <a href="https://x.com/G59Group26967" target="_blank" class="sns-btn x-btn">
            <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
        </a>
        <a href="https://www.tiktok.com/@group.g59" target="_blank" class="sns-btn tiktok-btn">
            <svg viewBox="0 0 448 512"><path d="M448 209.91a210.06 210.06 0 0 1-122.77-39.25V349.38A162.55 162.55 0 1 1 185 188.31V278.2a74.62 74.62 0 1 0 52.23 71.18V0l88 0a121.18 121.18 0 0 0 1.86 22.17A122.18 122.18 0 0 0 381 102.39a121.43 121.43 0 0 0 67 20.14Z"></path></svg>
        </a>
    </div>

    <script>
        const bodyTag = document.getElementById('body-tag');
        const mainImg = document.getElementById('dynamic-img');
        const mainContent = document.getElementById('main-content');
        const loadingScreen = document.getElementById('loading-screen');
        const snsButtons = document.getElementById('sns-buttons');

        let phase = parseInt(sessionStorage.getItem('phase') || '0');

        if (phase >= 5) {
            loadingScreen.style.display = 'none';
            document.getElementById('logo-screen').style.display = 'none';
            mainImg.src = 'main4.png';
            mainContent.classList.add('show');
            mainContent.style.opacity = '1';
            snsButtons.classList.add('show');
        } else {
            initSequence();
        }

        function initSequence() {
            if (phase === 3) bodyTag.classList.add('phase-3');
            if (phase === 3) {
                setInterval(() => {
                    const chars = 'キシガイアイドリル超越殺鏖!@#$%^&*()_+<>?:{}|';
                    const activeTexts = document.querySelectorAll('.teaser-screen.active .teaser-text, #loading-text-el');
                    activeTexts.forEach(el => {
                        const original = el.getAttribute('data-original') || el.innerHTML;
                        if (!el.hasAttribute('data-original')) el.setAttribute('data-original', original);
                        let glitched = original.split('').map(char => {
                            if (char === '<' || char === 'b' || char === 'r' || char === '>') return char; 
                            return Math.random() > 0.85 ? chars[Math.floor(Math.random() * chars.length)] : char;
                        }).join('');
                        el.innerHTML = glitched;
                    });
                }, 100);
                document.querySelector('.noise-overlay').style.display = 'block';
            }

            window.addEventListener('load', () => {
                let progress = 0;
                let limit = (phase === 1) ? 90 : (phase === 4 ? 59 : 100);
                const images = ['main.png', 'main.png', 'main2.png', 'main3.png', 'main4.png'];
                mainImg.src = images[phase];
                const progressBar = document.getElementById('progress-bar');
                const progressPercent = document.getElementById('percent');
                const timer = setInterval(() => {
                    progress += Math.floor(Math.random() * 5) + 2;
                    if (progress >= limit) {
                        progress = limit;
                        clearInterval(timer);
                        if (phase === 1) { spawnSingleError(); } 
                        else if (phase === 4) { spawnMassiveErrors(); } 
                        else { startSequence(); }
                    }
                    progressBar.style.width = progress + '%';
                    progressPercent.textContent = progress;
                }, 60);
            });
        }

        function spawnSingleError() { createPopup(window.innerWidth/2 - 160, window.innerHeight/2 - 60, true); }
        function spawnMassiveErrors() {
            let count = 0;
            const max = 20;
            const interval = setInterval(() => {
                createPopup(Math.random() * (window.innerWidth - 320), Math.random() * (window.innerHeight - 150), false);
                if (++count >= max) clearInterval(interval);
            }, 100);
        }
        function createPopup(x, y, isPhase1) {
            const div = document.createElement('div');
            div.className = 'error-popup-instance';
            div.style.left = x + 'px'; div.style.top = y + 'px';
            div.innerHTML = `<div style="background:var(--win-blue);color:#fff;padding:3px 6px;font-size:11px;font-weight:bold;">System Error</div><div style="padding:15px;color:#000;font-size:12px;">A critical error has occurred.</div><div style="text-align:center;padding-bottom:10px;"><button style="background:var(--win-gray);border:2px solid;border-color:#fff #000 #000 #fff;padding:2px 15px;cursor:pointer;">OK</button></div>`;
            document.body.appendChild(div);
            div.querySelector('button').onclick = () => {
                div.remove();
                if (isPhase1) { sessionStorage.setItem('phase', '2'); location.reload(); } 
                else if (document.querySelectorAll('.error-popup-instance').length === 0) { startPhase4RedSequence(); }
            };
        }

        async function startPhase4RedSequence() {
            bodyTag.classList.add('phase-4-red');
            let progress = 59;
            const timer = setInterval(() => {
                progress += 2;
                if (progress >= 100) { progress = 100; clearInterval(timer); startSequence(); }
                document.getElementById('progress-bar').style.width = progress + '%';
                document.getElementById('percent').textContent = progress;
            }, 30);
        }

        async function startSequence() {
            const wait = (ms) => new Promise(res => setTimeout(res, ms));
            loadingScreen.classList.add('loaded');
            await wait(phase === 3 ? 2500 : 1500);
            const logo = document.getElementById('logo-screen');
            logo.style.opacity = '1'; logo.style.visibility = 'visible';
            await wait(2200); logo.style.opacity = '0'; await wait(1000);
            const t1 = document.getElementById('teaser-1'); t1.classList.add('active'); await wait(2800); t1.classList.remove('active'); await wait(800);
            const t2 = document.getElementById('teaser-2'); t2.classList.add('active'); await wait(2400); t2.classList.remove('active'); await wait(800);
            const t3 = document.getElementById('teaser-3'); t3.classList.add('active'); await wait(3500); t3.classList.remove('active'); await wait(800);
            if (phase === 4) {
                const t4 = document.getElementById('teaser-4'); t4.classList.add('active'); await wait(1800); t4.classList.remove('active'); await wait(500);
            }
            mainContent.classList.add('show');
            snsButtons.classList.add('show');
            setTimeout(() => {
                let nextPhase = phase + 1;
                if (phase !== 1) sessionStorage.setItem('phase', nextPhase);
            }, 2000);
        }
    </script>
</body>
</html>
